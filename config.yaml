# French Dubbing Pipeline v4.0 — Configuration
# Place at /workspace/config.yaml

# ============================================================
# Paths  (created automatically by setup.sh)
# ============================================================
pipeline:
  input_folder:  /workspace/videos/input
  output_folder: /workspace/outputs
  models_folder: /workspace/models
  logs_folder:   /workspace/logs
  temp_folder:   /workspace/temp

# ============================================================
# Audio
# ============================================================
audio:
  # VoxCPM2 native synthesis rate — 48 kHz
  synthesis_sample_rate: 48000
  # Vimeo accepts both 44100 and 48000 Hz; 48000 avoids resampling loss
  output_sample_rate: 48000
  # Boost the final output by this percent (0 = off, 20 = +20%). Applied after
  # peak normalization; hard-clipped at ±1.0. Override at runtime: --volume-boost 20
  volume_boost_pct: 0

# ============================================================
# Speaker Diarization — pyannote.audio (optional)
# Detects who is speaking when and builds a separate voice-clone
# reference for each speaker, so every voice is dubbed distinctly.
# Requires: pip install pyannote.audio
# The HF token (translation.huggingface_token or $HF_TOKEN) must
# have accepted the model license:
#   https://huggingface.co/pyannote/speaker-diarization-community-1
# ============================================================
diarization:
  enabled: true
  model: pyannote/speaker-diarization-community-1
  # Set both to the same number to force an exact speaker count.
  min_speakers: 2
  max_speakers: 10
  # Seconds of each speaker's audio to assemble for their voice clone.
  profile_duration: 25

# ============================================================
# Source Separation — Demucs
# Separates speaker vocals from background music/noise before
# transcription and voice cloning.
# ============================================================
source_separation:
  enabled: true
  # htdemucs    → best quality (hybrid transformer, recommended)
  # htdemucs_ft → fine-tuned variant, slightly slower
  # mdx_extra   → lighter, good balance of speed and quality
  model: htdemucs
  # Re-mix the original background track (music, ambience) back with the
  # French dubbed vocals into a separate *_french_full.m4a output.
  preserve_background: true

# ============================================================
# Transcription — faster-whisper (CTranslate2)
# ============================================================
whisper:
  model: large-v3
  language: en
  device: cuda
  # float16       → best quality on RTX 4090
  # int8_float16  → lower VRAM, marginal accuracy loss
  compute_type: float16

# ============================================================
# Translation — Qwen3 via Ollama
# Single backend, single pass. The pipeline no longer micromanages
# per-segment character budgets; the audio assembler handles overflow
# with atempo (≤ tts.max_stretch) and gap-borrowing.
# ============================================================
translation:
  # Qwen3:14b via Ollama. /no_think is sent automatically for qwen3.* tags.
  model: qwen3:14b
  temperature: 0.3
  # 20 segments per Ollama call. Bigger batches save calls but risk hitting
  # the 4096-token output budget if segments are long.
  batch_size: 20
  # Optional self-review pass — Qwen rereads its own output and fixes
  # Anglicisms / register slips. Roughly doubles translation time.
  review_pass: false

  # Target language for the dub. Drives the prompt language label.
  # Supported: fr, es, de, it, pt, nl, pl, ru, ja, ko, zh, ar, tr, hi, vi.
  target_lang: fr

  # Locale variant.
  # "fr"    → standard European French (default, no glossary applied)
  # "fr-ca" → Canadian / Québécois French — loads canadian_glossary.yaml
  #           and applies prompt injection + 'always'-mode substitution.
  # Override at runtime with: --locale fr-ca
  locale: fr-ca
  glossary_path: /workspace/canadian_glossary.yaml

  # HuggingFace token — only used by the diarization gated model.
  # Leave blank to read from the HF_TOKEN environment variable instead.
  huggingface_token: ""

# ============================================================
# Text-to-Speech — VoxCPM2
# 2B diffusion AR model, Apache 2.0, voice cloning, 48 kHz output.
# ============================================================
tts:
  model: openbmb/VoxCPM2

  # Speaker reference clip for voice cloning.
  # 25 s gives VoxCPM2 substantially more voice data than 15 s.
  speaker_profile_duration: 25
  # Skip this many seconds from the start (avoids intro music / titles).
  speaker_profile_skip: 20

  # DeepFilterNet denoising on the speaker reference clip.
  use_deepfilter: true

  # Max atempo ratio for segments that overflow their window. Beyond this
  # ratio the segment is truncated with an 80 ms fade-out instead of being
  # sped up further (preserves voice quality).
  max_stretch: 1.25

  # VoxCPM2 inference quality knobs.
  # cfg_value: LM guidance strength. 2.5 is a good cross-lingual default.
  cfg_value: 2.5
  # inference_timesteps: LocDiT diffusion steps. 24 is the production sweet
  # spot; 32 for absolute max quality, 10 for fast preview.
  inference_timesteps: 24
  # use_prompt_text: Pass the reference audio's transcript ("Ultimate Cloning").
  # For cross-lingual dubbing (English ref → French output) this bleeds English
  # phonemes — keep false.
  use_prompt_text: false

  # Merge consecutive Whisper fragments into sentence-scale chunks before TTS.
  # The v3 sub-second fragments caused robotic prosody AND broken SRT timing;
  # 2–12 s chunks give the TTS context and keep subtitles readable.
  segment_merge_gap: 1.5
  segment_merge_max_duration: 12.0
  segment_merge_min_duration: 2.0

# ============================================================
# Subtitles
# ============================================================
subtitles:
  format: srt
  encoding: utf-8
  # Shift all subtitles N ms (positive = later, negative = earlier).
  sync_offset_ms: 0

# ============================================================
# Processing
# ============================================================
processing:
  max_workers: 1       # keep at 1 — models share 24 GB VRAM
  timeout_seconds: 7200
  # Set to true to skip temp-dir cleanup and dump intermediate segment JSON files.
  # Useful for inspecting what each pipeline stage produces (transcription, merge,
  # translation, etc.). Files land in temp_folder/<video-stem>/segments_NN_*.json.
  keep_temp: true
