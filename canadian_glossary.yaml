# Canadian French (Québécois) glossary for the dubbing pipeline
# Source: CAPS French Language Guidelines + OQLF terminology
#
# ── Term modes ───────────────────────────────────────────────────────────────
# mode: always  — deterministic post-processing substitution applied after
#                 translation. Safe for invariant, OQLF-officialised terms
#                 and CAPS brand terms where only one French form is correct.
# mode: suggest — injected into the translation prompt only. Use for terms
#                 where grammatical context determines gender/number, or where
#                 the European French form is also acceptable in QC.
#
# Fields:
#   en:     English source term (used in prompt hint + catches untranslated
#           English in post-processing substitution)
#   fr_ca:  Québécois / Canadian French target form
#   fr_std: Standard / European French form to replace in post-processing
#           (mode: always only). Leave blank when there is no European French
#           counterpart to substitute.
#   note:   Optional clarification injected into the translation prompt.

# ── Formatting rules (CAPS / Canadian French standards) ──────────────────────
# Injected into every translation prompt as a formatting section.
formatting_rules:
  - 'Quotation marks: use French guillemets with non-breaking spaces inside: « texte » — never use straight English double quotes " " in French text'
  - "Numbers: non-breaking space as thousands separator — 1 000 not 1,000"
  - "Decimal separator: use comma not period — 3,5 not 3.5"
  - "Dates: day first, month lowercase, no comma — 17 mars 2026 not March 17, 2026"
  - "Times: 24-hour format with h abbreviation — 20 h or 20 h 30 not 8:00 PM"
  - "Currency: dollar sign after number with non-breaking space — 87 $ plus taxes not $87 plus tax"
  - "Capitalization: job titles, days of the week, and months are lowercase in French — le président, lundi, mars"

# ── Inclusive language (CAPS standard) ───────────────────────────────────────
# Injected into every translation and review prompt.
inclusive_language:
  - "For 'speaker' or 'speakers', always use conférencier·ère / conférencier·ères (median dot ·, never slash / or parentheses)"
  - "Use gender-neutral collective nouns where possible: les membres, l'équipe, la communauté"
  - "For other paired masculine/feminine endings, use median dot: professionnel·le, participant·e, formateur·trice"
  - "Default to vous (not tu) when addressing members or the audience"
  - "Translate ideas naturally — the French should sound written in French from the start, not translated"

