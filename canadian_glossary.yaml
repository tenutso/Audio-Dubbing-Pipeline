  # ── Meals — CRITICAL: QC meal names are completely different from European French
  # European French:   petit-déjeuner  /  déjeuner  /  dîner
  # Canadian French:   déjeuner        /  dîner     /  souper
  # ──────────────────────────────────────────────────────────────────────────

  - en:     "breakfast"
    fr_ca:  "déjeuner"
    fr_std: "petit-déjeuner"
    mode:   always
    category: meals
    note:   "QC: déjeuner = breakfast — 'petit-déjeuner' is European French"

  - en:     "lunch"
    fr_ca:  "dîner"
    fr_std: ""
    mode:   suggest
    category: meals
    note:   "QC: dîner = lunch (European French: déjeuner = lunch)"

  - en:     "dinner"
    fr_ca:  "souper"
    fr_std: ""
    mode:   suggest
    category: meals
    note:   "QC: souper = dinner/supper (European French: dîner = dinner)"

  - en:     "supper"
    fr_ca:  "souper"
    fr_std: ""
    mode:   suggest
    category: meals

